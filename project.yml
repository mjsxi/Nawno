name: NawNo
options:
  bundleIdPrefix: com.nawno
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: "1.3.0"
schemes:
  NawNo:
    build:
      targets:
        NawNo: all
    run:
      config: Debug
targets:
  NawNo:
    type: application
    platform: macOS
    preBuildScripts:
      - name: Generate MLX Swift Version
        script: |
          RESOLVED="${SRCROOT}/NawNo.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved"
          OUTPUT="${SRCROOT}/NawNo/Generated/MLXSwiftVersion.swift"
          if [ -f "$RESOLVED" ]; then
            HASH=$(python3 -c "
          import json, sys
          data = json.load(open('$RESOLVED'))
          for pin in data.get('pins', []):
              if pin.get('identity') == 'mlx-swift-lm':
                  state = pin.get('state', {})
                  print(state.get('revision', ''))
                  sys.exit(0)
          print('')
          " 2>/dev/null || echo "")
          else
            HASH=""
          fi
          mkdir -p "$(dirname "$OUTPUT")"
          cat > "$OUTPUT" << SWIFT
          // Auto-generated by pre-build script — do not edit manually
          enum MLXSwiftVersion {
              static let commitHash = "$HASH"
          }
          SWIFT
        outputFiles:
          - $(SRCROOT)/NawNo/Generated/MLXSwiftVersion.swift
    sources:
      - NawNo
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: swift-transformers
        product: Tokenizers
      - package: swift-transformers
        product: Hub
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: NawNo/NawNo.entitlements
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9LYLW7S63Z
        INFOPLIST_FILE: NawNo/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.matt.nawno
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
